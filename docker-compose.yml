version: '3.8'

services:
  postgres:
    container_name: akram_shareholders_db
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: akram_user
      POSTGRES_PASSWORD: akram_pass
      POSTGRES_DB: akram_shareholders
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akram_user -d akram_shareholders"]
      interval: 5s
      timeout: 5s
      retries: 5

  akram-sweet-shareholders-app:
    container_name: akram_sweet_shareholders_app
    restart: always
    build: .
    environment:
      DEBUG: "True"
      DB_ENGINE: postgresql+psycopg2
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akram_shareholders
      DB_USERNAME: akram_user
      DB_PASS: akram_pass
      # Optional SMTP — also configurable in Settings → System (preferred).
      MAIL_SERVER: ${MAIL_SERVER:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
    volumes:
      # Persist admin-uploaded brand logos across rebuilds
      - brand_uploads:/app/apps/static/uploads/brand
    networks:
      - db_network
      - web_network
    depends_on:
      postgres:
        condition: service_healthy

  report-scheduler:
    container_name: akram_report_scheduler
    restart: always
    build: .
    environment:
      DEBUG: "True"
      DB_ENGINE: postgresql+psycopg2
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akram_shareholders
      DB_USERNAME: akram_user
      DB_PASS: akram_pass
      MAIL_SERVER: ${MAIL_SERVER:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
    volumes:
      - brand_uploads:/app/apps/static/uploads/brand
    networks:
      - db_network
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "while true; do python scripts/send_scheduled_reports.py; sleep 3600; done"

  nginx:
    container_name: nginx
    restart: always
    image: "nginx:latest"
    ports:
      - "5085:5085"
    volumes:
      - ./nginx:/etc/nginx/conf.d
    networks:
      - web_network
    depends_on:
      - akram-sweet-shareholders-app

volumes:
  postgres_data:
  brand_uploads:

networks:
  db_network:
    driver: bridge
  web_network:
    driver: bridge
